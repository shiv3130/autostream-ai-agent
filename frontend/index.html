<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoStream AI</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: rgba(15, 23, 42, 0.9);
    border-right: 1px solid rgba(255,255,255,0.1);
    padding: 20px;
}

.sidebar h2 {
    margin-bottom: 20px;
}

.new-chat {
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
}

/* Chat area */
.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* Messages */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

.message {
    max-width: 70%;
    margin-bottom: 15px;
    padding: 12px 16px;
    border-radius: 12px;
    backdrop-filter: blur(10px);
    animation: fadeIn 0.3s ease;
}
.messages {
    transition: all 0.2s ease;
}

.user {
    background: linear-gradient(45deg, #3b82f6, #6366f1);
    align-self: flex-end;
}

.bot {
    background: rgba(30, 41, 59, 0.8);
}

/* Input */
.input-box {
    display: flex;
    padding: 15px;
    background: rgba(15,23,42,0.9);
    border-top: 1px solid rgba(255,255,255,0.1);
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 12px 18px;
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
}


/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1;}
}

/* Typing cursor */
.cursor {
    display: inline-block;
    width: 8px;
    background: white;
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
#chatList {
    margin-top: 10px;
    max-height: 70vh;
    overflow-y: auto;
}

.chat-item {
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 8px;
    cursor: pointer;
    background: rgba(255,255,255,0.05);
    transition: 0.2s;
}

.chat-item:hover {
    background: rgba(255,255,255,0.1);
}

.chat-item.active {
    background: linear-gradient(45deg, #6366f1, #8b5cf6);
}

.delete-btn {
    float: right;
    color: red;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
    <h2>🚀 AutoStream</h2>
    <div class="new-chat" onclick="newChat()">+ New Chat</div>

    <div id="chatList"></div>
</div>

<div class="chat-area">
    <div class="messages" id="messages"></div>

    <div class="input-box">
        <input id="input" placeholder="Ask anything..." />
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
let messages = document.getElementById("messages");
let chatList = document.getElementById("chatList");

let chats = JSON.parse(localStorage.getItem("chats")) || {};
let currentChatId = null;

// Save chats
function saveChats() {
    localStorage.setItem("chats", JSON.stringify(chats));
}

// Render sidebar
function renderChatList() {
    chatList.innerHTML = "";

    Object.keys(chats).forEach(id => {
        const div = document.createElement("div");
        div.className = "chat-item" + (id == currentChatId ? " active" : "");

        let title = chats[id].title || "New Chat";

        div.innerHTML = `
            ${title}
            <span class="delete-btn" onclick="deleteChat('${id}', event)">×</span>
        `;

        div.onclick = () => loadChat(id);

        chatList.appendChild(div);
    });
}

// Load chat
function loadChat(id) {
    currentChatId = id;
    messages.innerHTML = chats[id].content || "";
    renderChatList();
}

// Delete chat
function deleteChat(id, event) {
    event.stopPropagation();
    delete chats[id];
    saveChats();

    if (currentChatId == id) {
        messages.innerHTML = "";
        currentChatId = null;
    }

    renderChatList();
}

// Create new chat
function newChat() {
    currentChatId = Date.now().toString();

    chats[currentChatId] = {
        title: "New Chat",
        content: ""
    };

    messages.innerHTML = "";
    saveChats();
    renderChatList();
}

// Add message
function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = text;
    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;

    if (currentChatId) {
        chats[currentChatId].content = messages.innerHTML;

        // Set title from first user message
        if (type === "user" && chats[currentChatId].title === "New Chat") {
            chats[currentChatId].title = text.substring(0, 20);
        }

        saveChats();
        renderChatList();
    }

    return div;
}

// Send message
async function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    if (!currentChatId) newChat();

    addMessage(text, "user");
    input.value = "";

    const botMsg = addMessage("", "bot");

    const response = await fetch("http://autostream-ai-agent.onrender.com/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: text })
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let result = "";

    while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const chunk = decoder.decode(value);
        result += chunk;
        botMsg.innerHTML = result + '<span class="cursor"></span>';

        chats[currentChatId].content = messages.innerHTML;
        saveChats();
    }

    botMsg.innerHTML = result;
    saveChats();
}

// Load last chat
window.onload = () => {
    const keys = Object.keys(chats);

    if (keys.length > 0) {
        currentChatId = keys[keys.length - 1];
        loadChat(currentChatId);
    }

    renderChatList();
};

// Enter key
document.getElementById("input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") send();
});
</script>
</body>
</html>
